<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AI Assistant</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family: 'Inter', sans-serif;

      height: 100vh;

      overflow: hidden;

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #111827,
          #1e293b
        );

      display: flex;
      justify-content: center;
      align-items: center;

      color: white;
    }

    .background-glow {

      position: absolute;

      width: 500px;
      height: 500px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(37,99,235,0.35),
          transparent 70%
        );

      top: -100px;
      left: -100px;

      filter: blur(60px);

      animation:
        pulse 6s infinite alternate;
    }

    @keyframes pulse {

      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.2);
      }

    }

    .chat-app {

      position: relative;

      width: 92%;
      max-width: 1100px;

      height: 92vh;

      backdrop-filter: blur(20px);

      background:
        rgba(17,24,39,0.75);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 28px;

      overflow: hidden;

      display: flex;
      flex-direction: column;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.4);
    }

    .topbar {

      padding: 22px 30px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      border-bottom:
        1px solid rgba(255,255,255,0.06);

      background:
        rgba(255,255,255,0.02);
    }

    .logo {

      display: flex;
      align-items: center;

      gap: 14px;

      font-size: 22px;
      font-weight: 700;
    }

    .logo-icon {

      width: 45px;
      height: 45px;

      border-radius: 14px;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #7c3aed
        );

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 22px;
    }

    .status {

      display: flex;
      align-items: center;

      gap: 10px;

      color: #9ca3af;
      font-size: 14px;
    }

    .status-dot {

      width: 10px;
      height: 10px;

      border-radius: 50%;

      background: #10b981;

      box-shadow:
        0 0 10px #10b981;
    }

    #chat {

      flex: 1;

      overflow-y: auto;

      padding: 35px;

      display: flex;
      flex-direction: column;

      gap: 22px;
    }

    #chat::-webkit-scrollbar {
      width: 8px;
    }

    #chat::-webkit-scrollbar-thumb {

      background:
        rgba(255,255,255,0.1);

      border-radius: 10px;
    }

    .message {

      display: flex;

      gap: 14px;

      animation:
        fadeIn 0.3s ease;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

    }

    .avatar {

      width: 48px;
      height: 48px;

      border-radius: 16px;

      display: flex;
      align-items: center;
      justify-content: center;

      font-weight: bold;

      flex-shrink: 0;
    }

    .user-avatar {

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #3b82f6
        );
    }

    .bot-avatar {

      background:
        linear-gradient(
          135deg,
          #7c3aed,
          #8b5cf6
        );
    }

    .bubble {

      max-width: 75%;

      padding: 18px 20px;

      border-radius: 22px;

      line-height: 1.7;

      font-size: 15px;

      white-space: pre-wrap;
    }

    .user-bubble {

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      border-top-left-radius: 6px;
    }

    .bot-bubble {

      background:
        rgba(255,255,255,0.06);

      border:
        1px solid rgba(255,255,255,0.05);

      border-top-left-radius: 6px;
    }

    .input-container {

      padding: 25px;

      border-top:
        1px solid rgba(255,255,255,0.06);

      background:
        rgba(255,255,255,0.02);
    }

    .input-box {

      display: flex;
      align-items: center;

      background:
        rgba(255,255,255,0.05);

      border:
        1px solid rgba(255,255,255,0.06);

      border-radius: 18px;

      padding: 10px;
    }

    input {

      flex: 1;

      background: transparent;

      border: none;

      outline: none;

      color: white;

      font-size: 15px;

      padding: 14px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {

      border: none;

      outline: none;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #7c3aed
        );

      color: white;

      padding: 14px 22px;

      border-radius: 14px;

      cursor: pointer;

      font-weight: 600;

      transition: 0.25s;
    }

    button:hover {

      transform: translateY(-2px);

      box-shadow:
        0 8px 20px rgba(37,99,235,0.35);
    }

    .typing {

      display: flex;
      gap: 6px;
      align-items: center;
    }

    .typing span {

      width: 8px;
      height: 8px;

      background: white;

      border-radius: 50%;

      animation:
        bounce 1s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }

      40% {
        transform: scale(1.2);
        opacity: 1;
      }

    }

  </style>

</head>

<body>

  <div class="background-glow"></div>

  <div class="chat-app">

    <div class="topbar">

      <div class="logo">

        <div class="logo-icon">
          🤖
        </div>

        AI Assistant

      </div>

      <div class="status">

        <div class="status-dot"></div>

        Online

      </div>

    </div>

    <div id="chat"></div>

    <div class="input-container">

      <div class="input-box">

        <input
          id="message"
          placeholder="Ask me anything..."
          onkeydown="handleKey(event)"
        />

        <button onclick="sendMessage()">
          Send
        </button>

      </div>

    </div>

  </div>

  <script>

    function handleKey(event) {

      if (event.key === "Enter") {
        sendMessage();
      }

    }

    async function sendMessage() {

      const input =
        document.getElementById("message");

      const message =
        input.value.trim();

      if (!message) return;

      const chat =
        document.getElementById("chat");

      chat.innerHTML += `

        <div class="message">

          <div class="avatar user-avatar">
            U
          </div>

          <div class="bubble user-bubble">
            ${message}
          </div>

        </div>

      `;

      input.value = "";

      chat.scrollTop =
        chat.scrollHeight;

      chat.innerHTML += `

        <div
          class="message"
          id="typing"
        >

          <div class="avatar bot-avatar">
            AI
          </div>

          <div class="bubble bot-bubble">

            <div class="typing">
              <span></span>
              <span></span>
              <span></span>
            </div>

          </div>

        </div>

      `;

      chat.scrollTop =
        chat.scrollHeight;

      const response = await fetch(
        "http://ai-chatbot-wniz.onrender.com/chat",
        {
          method: "POST",

          headers: {
            "Content-Type":
              "application/json",
          },

          body: JSON.stringify({
            message: message,
          }),
        }
      );

      const data =
        await response.json();

      document
        .getElementById("typing")
        .remove();

      chat.innerHTML += `

        <div class="message">

          <div class="avatar bot-avatar">
            AI
          </div>

          <div class="bubble bot-bubble">
            ${data.reply}
          </div>

        </div>

      `;

      chat.scrollTop =
        chat.scrollHeight;
    }

  </script>

</body>

</html>
